{% extends "base.html" %}

{% block title %}RADAR{% endblock %}

{% block styles %}
<style>
    body { margin: 0; overflow: hidden; font-family: monospace; }
    
    #status {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: white;
        background: rgba(0,0,0,0.7);
        padding: 8px 15px;
        border-radius: 5px;
        font-size: 14px;
        z-index: 100;
        pointer-events: none;
    }
    
    #zoom-info {
        position: absolute;
        bottom: 20px;
        right: 20px;
        color: white;
        background: rgba(0,0,0,0.7);
        padding: 8px 15px;
        border-radius: 5px;
        font-size: 12px;
        z-index: 100;
        pointer-events: none;
    }
    
    #info-panel {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 320px;
        background: rgba(0,0,0,0.95);
        color: white;
        padding: 15px;
        border-radius: 10px;
        font-size: 13px;
        z-index: 101;
        pointer-events: auto;
        backdrop-filter: blur(8px);
        border-left: 4px solid #ff6600;
        transition: all 0.3s ease;
        opacity: 0;
        transform: translateX(50px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    
    #info-panel.show {
        opacity: 1;
        transform: translateX(0);
    }
    
    #info-panel h3 {
        margin: 0 0 10px 0;
        color: #ff6600;
        font-size: 16px;
    }
    
    #info-panel p {
        margin: 8px 0;
        line-height: 1.4;
    }
    
    #info-panel .close {
        position: absolute;
        top: 10px;
        right: 15px;
        cursor: pointer;
        font-size: 18px;
        color: #999;
        transition: color 0.2s;
    }
    
    #info-panel .close:hover {
        color: white;
    }
    
    .info-label {
        color: #ffaa66;
        font-weight: bold;
        display: inline-block;
        width: 90px;
    }
    
    .instruction {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        background: rgba(0,0,0,0.5);
        padding: 5px 12px;
        border-radius: 5px;
        font-size: 12px;
        z-index: 100;
        pointer-events: none;
    }
    
    hr {
        margin: 10px 0;
        border-color: #444;
    }
    
    .flight-badge {
        display: inline-block;
        background: #ff6600;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 11px;
        margin-left: 8px;
    }
</style>
{% endblock %}

{% block content %}
    <div id="status">Загрузка данных...</div>
    <div id="zoom-info">Приближение: 100%</div>
    <div id="info-panel"></div>
{% endblock %}

{% block scripts %}
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>
<script type="module" src="{{ url_for('static', filename='earth3D.js') }}"></script>
{% endblock %}
