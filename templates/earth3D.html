{% extends "base.html" %}

{% block title %}RADAR{% endblock %}

{% block styles %}
<style>
    body { margin: 0; overflow: hidden; font-family: monospace; }

    #status {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: white;
        background: rgba(0,0,0,0.7);
        padding: 8px 15px;
        border-radius: 5px;
        font-size: 14px;
        z-index: 100;
        pointer-events: none;
    }

    #zoom-info {
        position: absolute;
        bottom: 20px;
        right: 20px;
        color: white;
        background: rgba(0,0,0,0.7);
        padding: 8px 15px;
        border-radius: 5px;
        font-size: 12px;
        z-index: 100;
        pointer-events: none;
    }

    #info-panel {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 320px;
        background: rgba(0,0,0,0.95);
        color: white;
        padding: 15px;
        border-radius: 10px;
        font-size: 13px;
        z-index: 101;
        pointer-events: auto;
        backdrop-filter: blur(8px);
        border-left: 4px solid #ff6600;
        transition: all 0.3s ease;
        opacity: 0;
        transform: translateX(50px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    #info-panel.show {
        opacity: 1;
        transform: translateX(0);
    }

    #info-panel h3 {
        margin: 0 0 10px 0;
        color: #ff6600;
        font-size: 16px;
    }

    #info-panel p {
        margin: 8px 0;
        line-height: 1.4;
    }

    #info-panel .close {
        position: absolute;
        top: 10px;
        right: 15px;
        cursor: pointer;
        font-size: 18px;
        color: #999;
        transition: color 0.2s;
    }

    #info-panel .close:hover {
        color: white;
    }

    .info-label {
        color: #ffaa66;
        font-weight: bold;
        display: inline-block;
        width: 90px;
    }

    #chat-widget {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 380px;
        border-radius: 12px;
        z-index: 200;
        font-family: monospace;
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        transition: all 0.3s ease;
    }

    #chat-widget.minimized .chat-body {
        display: none;
        background: transparent !important;
        backdrop-filter: none !important;
    }

    #chat-widget.minimized {
        width: auto;
        min-width: 200px;
        background: transparent;
        backdrop-filter: none;
        border: 2px solid #6bb5ff;
        box-shadow: none;
    }

    #chat-widget.minimized .chat-header {
        background: transparent;
}


    .chat-header {
        background: linear-gradient(135deg, #4a90d9, #3570b0);
        padding: 10px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 11px 11px 11px 11px;
        color: white;
        font-weight: bold;
        font-size: 14px;
        transition: background 0.2s;
    }


    .minimize-btn {
        background: rgba(255,255,255,0.2);
        border: none;
        color: white;
        cursor: pointer;
        font-size: 18px;
        padding: 0 8px;
        border-radius: 5px;
        transition: all 0.2s;
    }

    .minimize-btn:hover {
        background: rgba(255,255,255,0.3);
        transform: scale(1.05);
    }

    .chat-body {
        height: 450px;
        display: flex;
        flex-direction: column;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: transparent !important;
    }

    .chat-messages::-webkit-scrollbar {
        width: 5px;
    }

    .chat-messages::-webkit-scrollbar-track {
        background: #1a1a1a;
        border-radius: 3px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
        background: #6bb5ff;
        border-radius: 3px;
    }

    .message {
        margin-bottom: 5px;
        padding: 8px 12px;
        border-radius: 10px;
        word-wrap: break-word;
        max-width: 85%;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .user {
        background: linear-gradient(135deg, #6bb5ff, #4a90d9);
        color: white;
        align-self: flex-end;
        border-radius: 15px 15px 5px 15px;
    }

    .assistant {
        background: #2a2a2a;
        color: #e0e0e0;
        align-self: flex-start;
        border-left: 3px solid #6bb5ff;
        border-radius: 15px 15px 15px 5px;
    }

    .system {
        background: #1a1a2e;
        color: #888;
        text-align: center;
        font-style: italic;
        align-self: center;
        max-width: 90%;
    }

    .typing {
        background: #2a2a2a;
        padding: 10px 15px;
        border-radius: 15px;
        display: inline-flex;
        gap: 4px;
        align-items: center;
    }

    .typing span {
        width: 6px;
        height: 6px;
        background: #6bb5ff;
        border-radius: 50%;
        animation: typingAnim 1.4s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingAnim {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-8px); opacity: 1; }
    }

    .time {
        font-size: 9px;
        color: #888;
        margin-top: 5px;
        display: block;
    }

    .chat-input-area {
        display: flex;
        padding: 12px;
        border-top: 1px solid rgba(107, 181, 255, 0.3);
        gap: 8px;
    }

    .chat-input {
        flex: 1;
        background: #1a1a1a;
        border: 1px solid #333;
        padding: 8px 12px;
        color: white;
        border-radius: 20px;
        font-family: monospace;
        font-size: 12px;
        transition: all 0.2s;
    }

    .chat-input:focus {
        outline: none;
        border-color: #6bb5ff;
        background: #222;
    }

    .send-btn {
        background: linear-gradient(135deg, #6bb5ff, #4a90d9);
        border: none;
        color: white;
        padding: 8px 18px;
        cursor: pointer;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        transition: all 0.2s;
    }

    .send-btn:hover {
        transform: scale(1.02);
        background: linear-gradient(135deg, #7bc5ff, #5aa0e9);
    }

    .send-btn:disabled, .chat-input:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ff9800;
        margin-right: 6px;
        transition: background 0.3s;
    }

    .status-dot.online {
        background: #4caf50;
        animation: pulse 2s infinite;
    }

    .status-dot.error {
        background: #f44336;
    }

    @keyframes pulse {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.2); }
        100% { opacity: 1; transform: scale(1); }
    }

    .show-chat-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: linear-gradient(135deg, #6bb5ff, #4a90d9);
        border: none;
        border-radius: 50px;
        padding: 12px 20px;
        color: white;
        cursor: pointer;
        font-weight: bold;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(107, 181, 255, 0.3);
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
    }

    .show-chat-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(107, 181, 255, 0.5);
    }
</style>
{% endblock %}

{% block content %}
    <div id="status">Загрузка данных...</div>
    <div id="info-panel"></div>

    <div id="chat-widget" class="minimized">
        <div class="chat-header">
            <span>
                <span id="chat-status-dot" class="status-dot"></span>
                AI Помощник
            </span>
            <button class="minimize-btn" id="minimize-chat">+</button>
        </div>
        <div class="chat-body">
            <div class="chat-messages" id="chat-messages">
                <div class="message assistant">
                    Привет! Я AI помощник RADAR. Спрашивайте о рейсах и аэропортах!
                    <span class="time">Только что</span>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chat-input" placeholder="Задайте вопрос..." />
                <button class="send-btn" id="send-btn">Отпр</button>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>
<script type="module" src="{{ url_for('static', filename='earth3D.js') }}"></script>
{% endblock %}
